# Weekly AI skill reconciliation
#
# Runs Claude Code headless every Sunday to reconcile every skill in
# ai/skills/ against the current instruction files (ai/global, ai/local),
# then pushes any resulting changes directly to main.
#
# Owner decision: changes are pushed straight to main for transparency —
# this is a sanctioned exception to the "never commit to main" rule in
# ai/global/git.instructions.md, and CI commits are not GPG signed.
#
# Setup — two repository secrets are required:
#
#   SOURCE_PUSH_TOKEN — a personal access token with contents write access
#   to this repository, used for the checkout and the push to main (the
#   default GITHUB_TOKEN is not used for pushing).
#
#   CLAUDE_CODE_OAUTH_TOKEN — a long-lived Claude Code OAuth token tied to
#   your Claude subscription (Pro/Max). To create one:
#
#     1. On a machine where Claude Code is installed and logged in to your
#        subscription, run:  claude setup-token
#     2. Complete the browser authorisation and copy the token it prints
#        (it starts with sk-ant-oat).
#     3. Add it to this repository as an Actions secret named
#        CLAUDE_CODE_OAUTH_TOKEN:
#          - Web: Settings -> Secrets and variables -> Actions ->
#            New repository secret
#          - CLI: gh secret set CLAUDE_CODE_OAUTH_TOKEN --repo credfeto/credfeto-ai-skills
#
#   To rotate: revoke the old token (claude.ai -> Settings), re-run
#   "claude setup-token", and update the secret.
#
# Model: no --model flag is passed, so each run uses Claude Code's current
# default model, which tracks Anthropic's recommended best model over time
# (specific model names come and go, so nothing is pinned here). For the
# same reason the Claude Code CLI itself is installed unpinned — an old CLI
# would not know about current models.

---
name: "Reconcile AI Skills"

on:
  schedule:
    - cron: "0 6 * * 0" # Sundays at 06:00 UTC
  workflow_dispatch: # allow manual runs for testing

permissions:
  contents: read

concurrency:
  group: "reconcile-skills"
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: "Check required secrets"
        shell: bash
        run: |
          FAILED=false
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "::error::❌ CLAUDE_CODE_OAUTH_TOKEN secret is not set — see the comments at the top of this workflow for how to create it"
            FAILED=true
          fi
          if [ -z "${SOURCE_PUSH_TOKEN}" ]; then
            echo "::error::❌ SOURCE_PUSH_TOKEN secret is not set — see the comments at the top of this workflow"
            FAILED=true
          fi
          if [ "${FAILED}" = "true" ]; then
            exit 1
          fi
          echo "✅ Required secrets are set"
        env:
          CLAUDE_CODE_OAUTH_TOKEN: "${{secrets.CLAUDE_CODE_OAUTH_TOKEN}}"
          SOURCE_PUSH_TOKEN: "${{secrets.SOURCE_PUSH_TOKEN}}"

      - name: "Checkout"
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1
          token: "${{secrets.SOURCE_PUSH_TOKEN}}"

      - name: "Install dotnet"
        uses: ./.github/actions/dotnet-install
        with:
          GITHUB_TOKEN: "${{secrets.SOURCE_PUSH_TOKEN}}"
          NUGET_PUBLIC_RESTORE_FEED_CACHE: "${{vars.NUGET_BAGET_CACHE}}"
          NUGET_PUBLIC_RESTORE_FEED: "${{vars.NUGET_PUBLIC_RESTORE_FEED || 'https://api.nuget.org/v3/index.json'}}"
          NUGET_ADDITIONAL_RESTORE_FEED_RELEASE_CACHE: ""
          NUGET_ADDITIONAL_RESTORE_FEED_PRERELEASE_CACHE: ""
          NUGET_ADDITIONAL_RESTORE_FEED_RELEASE: ""
          NUGET_ADDITIONAL_RESTORE_FEED_PRERELEASE: ""

      - name: "Install changelog tool"
        uses: ./.github/actions/dotnet-tool
        with:
          TOOL_NAME: "Credfeto.ChangeLog.Cmd"

      - name: "Install Claude Code CLI"
        shell: bash
        run: |
          npm install -g @anthropic-ai/claude-code
          echo "✅ Claude Code $(claude --version) installed"

      - name: "Reconcile skills against instruction files"
        shell: bash
        run: |
          PROMPT=$(cat <<'RECONCILE_PROMPT'
          You are running unattended in GitHub Actions on the main branch of this repository.

          Task: reconcile every skill in ai/skills/ against the current instruction files.

          1. Read .ai-instructions, ai/global/index.md, and ai/local/index.md, and load the files they direct you to —
             in particular ai/local/skills.instructions.md, which defines the skill format, the generation rules,
             and the skill registry.
          2. For every skill in the registry: re-read its source instruction files and the skill itself.
             If the skill is stale, contradicts its sources, or is missing rules its sources now contain,
             regenerate it following the generation rules. The instruction files are the source of truth.
          3. Look for instruction content that now qualifies as a new skill (a repeatable workflow with a
             clear trigger and procedure). Create any such skill and add it to the registry. The installer
             auto-discovers skill folders, so it does not need editing for new skills.
          4. If a skill's source rules have been removed from the instruction files, remove the skill and
             its registry entry.
          5. Add a changelog entry with: dotnet changelog -f CHANGELOG.md -a <Type> -m "<message>"
             for every change you make — this repository's local rules require a changelog entry for
             every change.
          6. Do NOT run any git commit, push, or branch commands, and do not create issues or PRs — this workflow commits and pushes your file changes itself.
          7. If every skill already matches its sources, change nothing and finish.
          RECONCILE_PROMPT
          )
          # Scoped permissions: the agent may only read/edit files in the
          # workspace and run the specific tools reconciliation needs — no
          # arbitrary bash. The workflow, not the agent, commits and pushes.
          claude -p "${PROMPT}" \
            --permission-mode acceptEdits \
            --allowedTools "Read" "Glob" "Grep" "Edit" "Write" \
              "Bash(dotnet changelog:*)" \
              "Bash(shellcheck:*)" \
              "Bash(checkbashisms:*)" \
              "Bash(markdownlint:*)"
        env:
          CLAUDE_CODE_OAUTH_TOKEN: "${{secrets.CLAUDE_CODE_OAUTH_TOKEN}}"

      - name: "Validate changelog"
        uses: ./.github/actions/dotnet-tool-run
        with:
          WORKING_DIRECTORY: "${{github.workspace}}"
          TOOL_NAME: "changelog"
          TOOL_ARGUMENTS: "-f CHANGELOG.md --lint"

      - name: "Commit changes"
        uses: stefanzweifel/git-auto-commit-action@v7.2.0
        with:
          commit_message: "chore: weekly skill reconciliation against instruction files"
          file_pattern: "ai CHANGELOG.md"
          commit_user_name: "skills-reconciler[bot]"
          commit_user_email: "credfeto@users.noreply.github.com"
          commit_author: "skills-reconciler[bot] <credfeto@users.noreply.github.com>"
          skip_dirty_check: false
